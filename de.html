<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>데님 | Y&J Fabric</title>

  <link rel="stylesheet" href="de.css">
</head>

<body>

  <!-- 헤더 -->
  <header>

    <h2>Y&J Fabric</h2>

    <nav>
      <a href="index.html">홈</a>
      <a href="order.html">문의</a>
    </nav>

  </header>

  <!-- 메인 배너 -->
  <section class="hero">

    <div class="hero-overlay">
      <h1>데님</h1>
      <p>Premium Cotton Fabric</p>
    </div>

  </section>

  <!-- 카테고리 -->
  <section class="categories">

    <div class="dropdown-category">

      <div class="category">
        원단 ▾
      </div>

      <div class="dropdown-menu">
        <a href="co.html">면</a>
        <a href="li.html">린넨</a>
        <a href="de.html">데님</a>
        <a href="ra.html">레이온</a>
        <a href="da.html">다이마루</a>
      </div>

    </div>

    <a href="order.html" class="category">
      주문 제작
    </a>

  </section>

  <!-- 제목 -->
  <section class="page-title">
    <h2>데님 상품</h2>
  </section>

  <!-- 상품 -->
  <section class="products">

    <div class="grid" id="grid"></div>

    <div id="loading">
      로딩중...
    </div>

  </section>

  <!-- 스크립트 -->
  <script>

    const grid = document.getElementById("grid");
    const loading = document.getElementById("loading");

    let page = 0;
    const pageSize = 12;

    const products = [];

    for (let i = 1; i <= 60; i++) {

      products.push({
        img: `images/fabric${(i % 5) + 1}.jpg`,
        name: `상품 ${i}`
      });

    }

    function loadItems() {

      loading.style.display = "block";

      setTimeout(() => {

        const start = page * pageSize;
        const end = start + pageSize;

        const items = products.slice(start, end);

        items.forEach(product => {

          const div = document.createElement("div");

          div.className = "item";

          div.innerHTML = `
            <img src="${product.img}" alt="${product.name}">
            <p>${product.name}</p>
          `;

          grid.appendChild(div);

        });

        page++;

        loading.style.display = "none";

      }, 400);

    }

    window.addEventListener("scroll", () => {

      if (
        window.innerHeight + window.scrollY >=
        document.body.offsetHeight - 150
      ) {

        if (page * pageSize < products.length) {
          loadItems();
        }

      }

    });

    loadItems();

  </script>

</body>

</html>
