<!-- co.html -->

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다이마루 | Y&J Fabric</title>

  <link rel="stylesheet" href="co.css?v=7">

  <style>
    .search-wrap{
      width:100%;
      max-width:900px;
      margin:20px auto 10px;
      padding:0 20px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .search-box{
      flex:1;
    }

    .search-box input{
      width:100%;
      height:50px;
      border:1px solid #ddd;
      border-radius:12px;
      padding:0 15px;
      font-size:16px;
      outline:none;
    }

    .search-box input:focus{
      border-color:#222;
    }

    .sort-box{
      width:130px;
      flex-shrink:0;
    }

    .sort-box select{
      width:100%;
      height:50px;
      border:1px solid #ddd;
      border-radius:12px;
      padding:0 12px;
      font-size:15px;
      background:#fff;
      outline:none;
      cursor:pointer;
    }

    .sort-box select:focus{
      border-color:#222;
    }

    @media (max-width:768px){
      .search-wrap{
        gap:8px;
      }

      .sort-box{
        width:120px;
      }

      .search-box input,
      .sort-box select{
        height:46px;
        font-size:14px;
      }
    }
  </style>
</head>

<body>

  <header>

  <h2>Y&J Fabric</h2>

  <nav class="icon-nav">

    <a href="index.html" title="홈" class="icon-btn">
      🏠
    </a>

    <a href="order.html" title="문의" class="icon-btn">
      💬
    </a>

  </nav>

</header>

  <section class="hero">
    <div class="hero-overlay">
      <h1>다이마루</h1>
    </div>
  </section>

  <section class="categories">

    <div class="dropdown-category">
      <div class="category">
        원단 ▾
      </div>

      <div class="dropdown-menu">
        <a href="co.html">면</a>
        <a href="li.html">린넨</a>
        <a href="de.html">데님</a>
        <a href="ra.html">레이온</a>
        <a href="da.html">다이마루</a>
      </div>
    </div>

    <a href="order.html" class="category">
      상품 문의
    </a>

  </section>

  <section class="page-title">
    <h2>레이온 상품</h2>
  </section>

  <div class="search-wrap">

    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="상품 검색"
      >
    </div>

    <div class="sort-box">
      <select id="sortSelect">
        <option value="latest">최신순</option>
        <option value="name">이름순</option>
      </select>
    </div>

  </div>

  <section class="products">
    <div class="grid" id="grid"></div>

    <div id="loading">
      로딩중...
    </div>
  </section>

  <button id="topBtn">↑</button>
  <a
  href="https://open.kakao.com/o/smrFUTti/"
  target="_blank"
  id="kakaoBtn"
  title="카카오톡 문의"
>
  💬
</a>

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where
    }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAGNPNq_hkyUL4CRrUCNpMMQA9CmLGZy5o",
      authDomain: "ynjfabrickor.firebaseapp.com",
      projectId: "ynjfabrickor",
      storageBucket: "ynjfabrickor.firebasestorage.app",
      messagingSenderId: "807605740695",
      appId: "1:807605740695:web:4aaa88cf3387266bb635d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const grid = document.getElementById("grid");
    const loading = document.getElementById("loading");
    const topBtn = document.getElementById("topBtn");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");

    let page = 0;
    const pageSize = 12;

    let products = [];
    let filteredProducts = [];

    async function loadProducts() {

      try {

        loading.style.display = "block";

        const q = query(
          collection(db, "products"),
          where("category", "==", "da")
        );

        const querySnapshot = await getDocs(q);

        products = [];

        querySnapshot.forEach((doc) => {
          products.push(doc.data());
        });

        filteredProducts = [...products];

        sortProducts("latest");

        if (products.length === 0) {
          loading.innerHTML = "등록된 상품이 없습니다.";
          return;
        }

        renderProducts();

      } catch (error) {

        console.error(error);
        loading.innerHTML = "상품을 불러오지 못했습니다.";

      }

    }

    function sortProducts(type){

      if(type === "latest"){
        filteredProducts.sort((a, b) => {
          return b.createdAt - a.createdAt;
        });
      }

      if(type === "name"){
        filteredProducts.sort((a, b) => {
          return a.name.localeCompare(
            b.name,
            "ko"
          );
        });
      }

    }

    function renderProducts(reset = true) {

      if(reset){
        page = 0;
        grid.innerHTML = "";
      }

      const start = page * pageSize;
      const end = start + pageSize;

      const items = filteredProducts.slice(start, end);

      items.forEach(product => {

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <div class="item-image-wrap">

            <img
              src="${product.image}"
              alt="${product.name}"
              loading="lazy"
              class="${
                product.soldOut
                ? "soldout-image"
                : ""
              }"
            >

            ${
              product.soldOut
              ? `
                <div class="soldout-badge">
                  품절
                </div>
              `
              : ""
            }

          </div>

          <p class="product-name">${product.name}</p>
        `;

        grid.appendChild(div);

      });

      const images = grid.querySelectorAll("img");

      images.forEach((img) => {

        if(img.complete){
          img.classList.add("loaded");
        } else {
          img.onload = () => {
            img.classList.add("loaded");
          };
        }

      });

      page++;

      if(filteredProducts.length === 0){

        grid.innerHTML = `
          <p style="
            width:100%;
            text-align:center;
            padding:40px 0;
            color:#777;
          ">
            검색 결과가 없습니다.
          </p>
        `;

      }

      loading.style.display = "none";

    }

    searchInput.addEventListener("input", () => {

      const keyword =
        searchInput.value
        .toLowerCase()
        .trim();

      filteredProducts = [...products].filter(product => {
        return product.name
          .toLowerCase()
          .includes(keyword);
      });

      sortProducts(sortSelect.value);
      renderProducts(true);

    });

    sortSelect.addEventListener("change", () => {

      sortProducts(sortSelect.value);
      renderProducts(true);

    });

    window.addEventListener("scroll", () => {

      if (
        window.innerHeight + window.scrollY >=
        document.body.offsetHeight - 150
      ) {
        if (
          page * pageSize <
          filteredProducts.length
        ) {
          renderProducts(false);
        }
      }

      if (window.scrollY > 300) {
        topBtn.classList.add("show");
      } else {
        topBtn.classList.remove("show");
      }

    });

    topBtn.addEventListener("click", () => {

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });

    });

    loadProducts();

  </script>
<!-- 맨 아래 </body> 바로 위에 추가 -->

<!-- 상품 확대 팝업 -->
<div id="imageModal" class="modal">

  <span class="modal-close">&times;</span>

  <div class="modal-content-wrap">
    <img id="modalImage" class="modal-image" src="" alt="">
    <p id="modalProductName" class="modal-product-name"></p>
  </div>

</div>

<script>
  // 기존 상품 렌더링 후 카드 클릭 이벤트 연결
  document.addEventListener("click", function(e) {
    const item = e.target.closest(".item");
    if (!item) return;

    const img = item.querySelector("img");
    const name = item.querySelector(".product-name");

    if (!img || !name) return;

    document.getElementById("modalImage").src = img.src;
    document.getElementById("modalProductName").textContent = name.textContent;

    document.getElementById("imageModal").classList.add("show");
  });

  // 닫기 버튼
  document.querySelector(".modal-close").addEventListener("click", function() {
    document.getElementById("imageModal").classList.remove("show");
  });

  // 바깥 클릭 닫기
  document.getElementById("imageModal").addEventListener("click", function(e) {
    if (e.target === this) {
      this.classList.remove("show");
    }
  });
</script>
</body>
</html>
