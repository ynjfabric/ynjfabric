<!-- co.html -->

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>린넨 | Y&J Fabric</title>

  <link rel="stylesheet" href="co.css?v=8">

  <style>

    .search-wrap{
      width:100%;
      max-width:900px;
      margin:20px auto 10px;
      padding:0 20px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .search-box{
      flex:1;
    }

    .search-box input{
      width:100%;
      height:50px;
      border:1px solid #ddd;
      border-radius:12px;
      padding:0 15px;
      font-size:16px;
      outline:none;
    }

    .search-box input:focus{
      border-color:#222;
    }

    .sort-box{
      width:130px;
      flex-shrink:0;
    }

    .sort-box select{
      width:100%;
      height:50px;
      border:1px solid #ddd;
      border-radius:12px;
      padding:0 12px;
      font-size:15px;
      background:#fff;
      outline:none;
      cursor:pointer;
    }

    .sort-box select:focus{
      border-color:#222;
    }

    /* =========================
       상품 팝업
    ========================= */

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      z-index:99999;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal.show{
      display:flex;
    }

    .modal-content-wrap{
      width:100%;
      max-width:1200px;
      background:white;
      border-radius:20px;
      overflow:hidden;
      display:flex;
      gap:0;
      max-height:90vh;
    }

    .modal-left{
      flex:1;
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal-image{
      width:100%;
      max-height:80vh;
      object-fit:contain;
      border-radius:12px;
    }

    .modal-right{
      width:420px;
      background:white;
      padding:35px;
      overflow-y:auto;
    }

    .modal-product-name{
      font-size:32px;
      margin-bottom:25px;
      color:#111;
      line-height:1.3;
      word-break:keep-all;
    }

    .modal-detail-box{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-bottom:25px;
    }

    .modal-detail-item{
      border-bottom:1px solid #eee;
      padding-bottom:12px;
    }

    .modal-detail-label{
      font-size:13px;
      color:#888;
      margin-bottom:5px;
    }

    .modal-detail-value{
      font-size:17px;
      color:#222;
      font-weight:600;
      word-break:break-word;
    }

    .modal-description{
      font-size:15px;
      color:#444;
      line-height:1.8;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .modal-close{
      position:absolute;
      top:20px;
      right:30px;
      color:white;
      font-size:44px;
      cursor:pointer;
      z-index:100000;
      line-height:1;
    }

    .modal-close:hover{
      opacity:0.7;
    }

    @media (max-width:768px){

      .search-wrap{
        gap:8px;
      }

      .sort-box{
        width:120px;
      }

      .search-box input,
      .sort-box select{
        height:46px;
        font-size:14px;
      }

      .modal-content-wrap{
        flex-direction:column;
        max-height:92vh;
      }

      .modal-left{
        padding:12px;
      }

      .modal-image{
        max-height:45vh;
      }

      .modal-right{
        width:100%;
        padding:22px;
      }

      .modal-product-name{
        font-size:24px;
        margin-bottom:20px;
      }

      .modal-detail-value{
        font-size:15px;
      }

      .modal-description{
        font-size:14px;
      }

      .modal-close{
        top:14px;
        right:18px;
        font-size:36px;
      }

    }

  </style>
</head>

<body>

<header>

  <h2>Y&J Fabric</h2>

  <nav class="icon-nav">

    <a href="index.html"
       title="홈"
       class="icon-btn">
      🏠
    </a>

    <a href="order.html"
       title="문의"
       class="icon-btn">
      💬
    </a>

  </nav>

</header>

<section class="hero">

  <div class="hero-overlay">

    <h1>린넨</h1>


  </div>

</section>

<section class="categories">

  <div class="dropdown-category">

    <div class="category">
      원단 ▾
    </div>

    <div class="dropdown-menu">

      <a href="co.html">면</a>
      <a href="li.html">린넨</a>
      <a href="de.html">데님</a>
      <a href="ra.html">레이온</a>
      <a href="da.html">다이마루</a>

    </div>

  </div>

  <a href="order.html"
     class="category">
    상품 문의
  </a>

</section>

<section class="page-title">

  <h2>린넨 상품</h2>

</section>

<div class="search-wrap">

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="상품 검색"
    >

  </div>

  <div class="sort-box">

    <select id="sortSelect">

      <option value="latest">
        최신순
      </option>
      <option value="popular">
        인기순
      </option>
      <option value="name">
        이름순
      </option>

    </select>

  </div>

</div>

<section class="products">

  <div class="grid"
       id="grid"></div>

  <div id="loading">
    로딩중...
  </div>

</section>

<button id="topBtn">
  ↑
</button>

<a
  href="https://open.kakao.com/o/smrFUTti/"
  target="_blank"
  id="kakaoBtn"
  title="카카오톡 문의"
>
  💬
</a>
<button id="filterBtn"
        class="filter-btn">

  필터

</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  doc,
  updateDoc,
  increment
}
from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyAGNPNq_hkyUL4CRrUCNpMMQA9CmLGZy5o",

  authDomain: "ynjfabrickor.firebaseapp.com",

  projectId: "ynjfabrickor",

  storageBucket: "ynjfabrickor.firebasestorage.app",

  messagingSenderId: "807605740695",

  appId: "1:807605740695:web:4aaa88cf3387266bb635d2"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const grid =
  document.getElementById("grid");

const loading =
  document.getElementById("loading");

const topBtn =
  document.getElementById("topBtn");

const searchInput =
  document.getElementById("searchInput");

const sortSelect =
  document.getElementById("sortSelect");

let page = 0;

const pageSize = 12;

let products = [];
let selectedFilters = {
  color: [],
  thickness: [],
  stretch: [],
  seeThrough: [],
  touch: []
};
const filterOptions = {
  color: [
    "화이트",
    "아이보리",
    "베이지",
    "브라운",
    "그레이",
    "블랙",
    "레드",
    "핑크",
    "오렌지",
    "옐로우",
    "그린",
    "블루",
    "네이비",
    "퍼플",
    "멀티"
  ],

  thickness: [
    "얇음",
    "보통",
    "두꺼움"
  ],

  stretch: [
    "없음",
    "약간",
    "좋음"
  ],

  seeThrough: [
    "없음",
    "약간",
    "있음"
  ],
  touch: [
  "부드러움",
  "보통",
  "거침"
  ]
};
let filteredProducts = [];
async function loadProducts(){

  try{

    loading.style.display = "block";

    const q =
      query(
        collection(db, "products"),
        where("category", "==", "li")
      );

    const querySnapshot =
      await getDocs(q);

    products = [];

    querySnapshot.forEach((docSnap) => {

  products.push({
    id: docSnap.id,
    ...docSnap.data()
  });

});

    filteredProducts = [...products];

    sortProducts("latest");

    if(products.length === 0){

      loading.innerHTML =
        "등록된 상품이 없습니다.";

      return;

    }
    renderFilterModal();
    renderProducts();

  }catch(error){

    console.error(error);

    loading.innerHTML =
      "상품을 불러오지 못했습니다.";

  }

}

function sortProducts(type){

  filteredProducts.sort((a, b) => {

    // 품절 상품 맨 아래
    if(!!a.soldOut !== !!b.soldOut){
      return a.soldOut ? 1 : -1;
    }

    // 최신순
    if(type === "latest"){

      const aTime = a.createdAt || 0;
      const bTime = b.createdAt || 0;

      return bTime - aTime;

    }
// 인기순
  if(type === "popular"){

  return (b.viewCount || 0)
       - (a.viewCount || 0);

}
    // 이름순
    if(type === "name"){

      return (a.name || "").localeCompare(
        b.name || "",
        "ko"
      );

    }

    return 0;

  });

}

function renderProducts(reset = true){

  if(reset){

    page = 0;

    grid.innerHTML = "";

  }

  const start =
    page * pageSize;

  const end =
    start + pageSize;

  const items =
    filteredProducts.slice(start, end);

  items.forEach((product, index) => {

    const div =
      document.createElement("div");

    div.className = "item";

    div.dataset.index =
      start + index;

    div.innerHTML = `

  <div class="main-product-image-wrap">

    ${
      product.soldOut
      ? `
        <div class="soldout-badge">
          품절
        </div>
      `
      : ""
    }

    <img
      src="${product.image}"
      alt="${product.name}"
      class="
        main-product-image
        ${
          product.soldOut
          ? "soldout-image"
          : ""
        }
      "
      loading="lazy"
    >

  </div>

  <p class="product-name">
    ${product.name}
  </p>

  <p class="product-price">
    ₩${Number(product.price || 0).toLocaleString()}
  </p>

`;

    grid.appendChild(div);

  });

  const images =
    grid.querySelectorAll("img");

  images.forEach((img) => {

    if(img.complete){

      img.classList.add("loaded");

    }else{

      img.onload = () => {

        img.classList.add("loaded");

      };

    }

  });

  page++;

  if(filteredProducts.length === 0){

    grid.innerHTML = `

      <p style="
        width:100%;
        text-align:center;
        padding:40px 0;
        color:#777;
      ">

        검색 결과가 없습니다.

      </p>

    `;

  }

  loading.style.display = "none";

}

searchInput.addEventListener("input", () => {

  const keyword =
    searchInput.value
    .toLowerCase()
    .trim();

  applyFilters();

  sortProducts(sortSelect.value);

  renderProducts(true);

});

sortSelect.addEventListener("change", () => {

  sortProducts(sortSelect.value);

  renderProducts(true);

});

window.addEventListener("scroll", () => {

  if(

    window.innerHeight +
    window.scrollY >=
    document.body.offsetHeight - 150

  ){

    if(

      page * pageSize <
      filteredProducts.length

    ){

      renderProducts(false);

    }

  }

  if(window.scrollY > 300){

    topBtn.classList.add("show");

  }else{

    topBtn.classList.remove("show");

  }

});

topBtn.addEventListener("click", () => {

  window.scrollTo({

    top:0,

    behavior:"smooth"

  });

});

loadProducts();

/* =========================
   상품 팝업
========================= */

document.addEventListener("click", function(e){

  const item =
    e.target.closest(".item");

  if(!item) return;

  const index =
    item.dataset.index;

  const product =
    filteredProducts[index];
    if(product.id){

  updateDoc(
    doc(db,"products",product.id),
    {
      viewCount: increment(1)
    }
  );

}
    
setTimeout(() => {


  const copyBtn =
    document.getElementById("copyBtn");

  if(copyBtn){

    copyBtn.onclick = () => {

      const text = `
상품명 : ${product.name || "-"}
색상 : ${product.color || "-"}
`;

      navigator.clipboard.writeText(text);

      alert("상품 정보가 복사되었습니다.");

    };

  }

}, 0);
  if(!product) return;

  document.getElementById("modalImage").src =
    product.image || "";

  document.getElementById("modalProductName").textContent =
    product.name || "-";

  document.getElementById("modalFabricName").textContent =
    product.fabricName || "-";

  document.getElementById("modalColor").textContent =
    product.color || "-";

  document.getElementById("modalWidth").textContent =
    product.width || "-";

  document.getElementById("modalPrice").textContent =
    product.price || "-";
document.getElementById("modalThickness").textContent =
  product.thickness || "-";

document.getElementById("modalStretch").textContent =
  product.stretch || "-";

document.getElementById("modalSeeThrough").textContent =
  product.seeThrough || "-";

document.getElementById("modalTouch").textContent =
  product.touch || "-";
  document.getElementById("modalDescription").textContent =
    product.detail || "상세 설명이 없습니다.";

  document
    .getElementById("imageModal")
    .classList.add("show");

});

document
  .querySelector(".modal-close")
  .addEventListener("click", function(){

    document
      .getElementById("imageModal")
      .classList.remove("show");

});

document
  .getElementById("imageModal")
  .addEventListener("click", function(e){

    if(e.target === this){

      this.classList.remove("show");

    }

});
/* =========================
   필터
========================= */

document
  .getElementById("filterBtn")
  .addEventListener("click", () => {

    renderFilterModal();

    document
      .getElementById("filterModal")
      .classList.add("show");

  });

document
.getElementById("closeFilter")
.onclick = () => {

  document
    .getElementById("filterModal")
    .classList.remove("show");

};

function renderFilterModal(){

  createGroup(
    "colorGroup",
    "색상",
    "color"
  );

  createGroup(
    "thicknessGroup",
    "두께",
    "thickness"
  );

  createGroup(
    "stretchGroup",
    "신축성",
    "stretch"
  );

  createGroup(
    "seeThroughGroup",
    "비침",
    "seeThrough"
  );
  createGroup(
  "touchGroup",
  "촉감",
  "touch"
);

}

function createGroup(
  containerId,
  title,
  key
){

  const box =
    document.getElementById(
      containerId
    );

  const items = filterOptions[key];

  box.innerHTML = `

    <h4
      style="
        margin-bottom:15px;
        font-size:16px;
      "
    >

      ${title}

    </h4>

    <div
      class="filter-items"
    ></div>

  `;

  const wrap =
    box.querySelector(
      ".filter-items"
    );

  items.forEach(item => {

    const chip =
      document.createElement(
        "div"
      );

    chip.className =
      "filter-chip";

    chip.textContent =
      item;

    if(
      selectedFilters[key]
      .includes(item)
    ){
      chip.classList.add(
        "active"
      );
    }

    chip.onclick = () => {

      chip.classList.toggle(
        "active"
      );

      if(
        chip.classList.contains(
          "active"
        )
      ){

        if(
          !selectedFilters[key]
            .includes(item)
        ){
          selectedFilters[key]
            .push(item);
        }

      }else{

        selectedFilters[key] =
          selectedFilters[key]
            .filter(
              v => v !== item
            );

      }

    };

    wrap.appendChild(chip);

  });

}

document
  .getElementById(
    "applyFilter"
  )
  .addEventListener(
    "click",
    applyFilters
  );

function applyFilters(){

  const keyword =
    searchInput.value
      .toLowerCase()
      .trim();

  filteredProducts =
    products.filter(product => {

      const searchMatch =
        product.name
          .toLowerCase()
          .includes(keyword);

      const colorMatch =
        !selectedFilters.color.length
        ||
        selectedFilters.color
          .includes(
            product.color
          );

      const thicknessMatch =
        !selectedFilters.thickness.length
        ||
        selectedFilters.thickness
          .includes(
            product.thickness
          );

      const stretchMatch =
        !selectedFilters.stretch.length
        ||
        selectedFilters.stretch
          .includes(
            product.stretch
          );

      const seeThroughMatch =
        !selectedFilters
          .seeThrough.length
        ||
        selectedFilters
          .seeThrough
          .includes(
            product.seeThrough
          );
          const touchMatch =
          !selectedFilters.touch.length ||
          selectedFilters.touch.includes(
          product.touch
          );

      return (

        searchMatch
        &&
        colorMatch
        &&
        thicknessMatch
        &&
        stretchMatch
        &&
        seeThroughMatch
        &&
        touchMatch
      );

    });

  sortProducts(
    sortSelect.value
  );

  renderProducts(true);

  document
    .getElementById(
      "filterModal"
    )
    .classList.remove(
      "show"
    );

}

document
.getElementById("resetFilter")
.onclick = () => {

  selectedFilters = {
    color: [],
    thickness: [],
    stretch: [],
    seeThrough: [],
    touch: []
  };

  renderFilterModal();

};

</script>

<!-- 상품 확대 팝업 -->
<div id="imageModal"
     class="modal">

  <span class="modal-close">
    &times;
  </span>

  <div class="modal-content-wrap">

    <!-- 왼쪽 이미지 -->
    <div class="modal-left">

      <img
        id="modalImage"
        class="modal-image"
        src=""
        alt=""
      >

    </div>
<div class="modal-right">
    <!-- 오른쪽 정보 -->
    <div class="modal-top">

  <h2
    id="modalProductName"
    class="modal-product-name"
  ></h2>

  <div class="modal-btn-group">

    <button
      id="copyBtn"
      class="modal-copy-btn"
    >
      📋 복사
    </button>

    <a
      href="https://open.kakao.com/o/smrFUTti"
      target="_blank"
      class="modal-kakao-btn"
    >
      💬 문의
    </a>
    

  </div>

</div>

      <div class="modal-detail-box">

        <div class="modal-detail-item">

          <div class="modal-detail-label">
            원단명
          </div>

          <div
            id="modalFabricName"
            class="modal-detail-value"
          ></div>

        </div>

        <div class="modal-detail-item">

          <div class="modal-detail-label">
            색상
          </div>

          <div
            id="modalColor"
            class="modal-detail-value"
          ></div>

        </div>

        <div class="modal-detail-item">

          <div class="modal-detail-label">
            원단 폭
          </div>

          <div
            id="modalWidth"
            class="modal-detail-value"
          ></div>

        </div>

        <div class="modal-detail-item">

          <div class="modal-detail-label">
            3마 기준 가격
          </div>

          <div
            id="modalPrice"
            class="modal-detail-value"
          ></div>

        </div>
<div class="modal-detail-item">
  <div class="modal-detail-label">
    두께
  </div>
  <div
    id="modalThickness"
    class="modal-detail-value"
  ></div>
</div>

<div class="modal-detail-item">
  <div class="modal-detail-label">
    신축성
  </div>
  <div
    id="modalStretch"
    class="modal-detail-value"
  ></div>
</div>

<div class="modal-detail-item">
  <div class="modal-detail-label">
    비침
  </div>
  <div
    id="modalSeeThrough"
    class="modal-detail-value"
  ></div>
</div>

<div class="modal-detail-item">
  <div class="modal-detail-label">
    촉감
  </div>
  <div
    id="modalTouch"
    class="modal-detail-value"
  ></div>
</div>
      </div>

      <div
        id="modalDescription"
        class="modal-description"
      ></div>

    </div>

  </div>
</div>
</div>
<div id="filterModal"
     class="filter-modal">

  <div class="filter-box">

    <span id="closeFilter"
          class="filter-close">

      ✕

    </span>

    <h3>필터</h3>

    <div id="colorGroup"></div>

    <div class="filter-row">

      <div id="thicknessGroup"></div>

      <div id="stretchGroup"></div>

      <div id="seeThroughGroup"></div>
      <div id="touchGroup"></div>

    </div>

    <div class="filter-footer">

      <button id="resetFilter">

        초기화

      </button>

      <button id="applyFilter">

        적용

      </button>

    </div>

  </div>

</div>
</body>
</html>
