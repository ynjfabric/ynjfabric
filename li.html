<!-- co.html -->

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>린넨 | Y&J Fabric</title>

  <link rel="stylesheet" href="li.css?v=4">
</head>

<body>

  <!-- 헤더 -->
  <header>

    <h2>Y&J Fabric</h2>

    <nav>
      <a href="index.html">홈</a>
      <a href="order.html">문의</a>
    </nav>

  </header>

  <!-- 메인 배너 -->
  <section class="hero">

    <div class="hero-overlay">
      <h1> 린넨 </h1>
      <p>Premium Cotton Fabric</p>
    </div>

  </section>

  <!-- 카테고리 -->
  <section class="categories">

    <div class="dropdown-category">

      <div class="category">
        원단 ▾
      </div>

      <div class="dropdown-menu">
        <a href="co.html">면</a>
        <a href="li.html">린넨</a>
        <a href="de.html">데님</a>
        <a href="ra.html">레이온</a>
        <a href="da.html">다이마루</a>
      </div>

    </div>

    <a href="order.html" class="category">
      상품 문의
    </a>

  </section>

  <!-- 제목 -->
  <section class="page-title">
    <h2>면 원단 상품</h2>
  </section>

  <!-- 상품 -->
  <section class="products">

    <div class="grid" id="grid"></div>

    <div id="loading">
      로딩중...
    </div>

  </section>

  <!-- 맨 위 버튼 -->
  <button id="topBtn">↑</button>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where
    }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    // Firebase 설정
    const firebaseConfig = {

      apiKey: "AIzaSyAGNPNq_hkyUL4CRrUCNpMMQA9CmLGZy5o",

      authDomain: "ynjfabrickor.firebaseapp.com",

      projectId: "ynjfabrickor",

      storageBucket: "ynjfabrickor.firebasestorage.app",

      messagingSenderId: "807605740695",

      appId: "1:807605740695:web:4aaa88cf3387266bb635d2"

    };

    // Firebase 시작
    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    // 요소
    const grid = document.getElementById("grid");

    const loading = document.getElementById("loading");

    const topBtn = document.getElementById("topBtn");

    // 페이지
    let page = 0;

    const pageSize = 12;

    let products = [];

    // Firestore 상품 불러오기
    async function loadProducts() {

      try {

        loading.style.display = "block";

        // 🔥 products 컬렉션에서 category가 co인 상품만 가져오기
        const q = query(
          collection(db, "products"),
          where("category", "==", "li")
        );

        const querySnapshot = await getDocs(q);

        products = [];

        querySnapshot.forEach((doc) => {

          products.push(doc.data());

        });

        // 상품 없을 때
        if (products.length === 0) {

          loading.innerHTML = "등록된 상품이 없습니다.";

          return;

        }

        // 첫 상품 출력
        loadItems();

      } catch (error) {

        console.error(error);

        loading.innerHTML = "상품을 불러오지 못했습니다.";

      }

    }

    // 상품 출력
    function loadItems() {

      const start = page * pageSize;

      const end = start + pageSize;

      const items = products.slice(start, end);

      items.forEach(product => {

        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <p>${product.name}</p>
        `;

        grid.appendChild(div);

      });

      page++;

      loading.style.display = "none";

    }

    // 스크롤
    window.addEventListener("scroll", () => {

      // 무한 스크롤
      if (
        window.innerHeight + window.scrollY >=
        document.body.offsetHeight - 150
      ) {

        if (page * pageSize < products.length) {

          loadItems();

        }

      }

      // 맨 위 버튼 표시
      if (window.scrollY > 300) {

        topBtn.classList.add("show");

      } else {

        topBtn.classList.remove("show");

      }

    });

    // 맨 위 이동
    topBtn.addEventListener("click", () => {

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });

    });

    // 실행
    loadProducts();

  </script>

</body>

</html>
