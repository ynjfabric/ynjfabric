<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Y&J Fabric</title>

  <link rel="stylesheet" href="main.css?v=3">

  <style>

    .main-product-image-wrap{
      position:relative;
      overflow:hidden;
      border-radius:12px;
    }

    .main-product-image{
      width:100%;
      border-radius:12px;
      aspect-ratio:1/1;
      object-fit:cover;
      background:#f3f3f3;
      opacity:0;
      transition:opacity .3s ease;
      display:block;
      cursor:pointer;
    }

    .main-product-image.loaded{
      opacity:1;
    }

    .soldout-image{
      filter:grayscale(100%) brightness(0.7);
    }

    .soldout-badge{
      position:absolute;
      top:12px;
      left:12px;
      background:#d11a2a;
      color:white;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:bold;
      z-index:10;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    @media (max-width:768px){

      .soldout-badge{
        top:8px;
        left:8px;
        padding:6px 12px;
        font-size:12px;
      }

    }

    /* =========================
       모달
    ========================= */

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      z-index:99999;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal.show{
      display:flex;
    }

    .modal-content-wrap{
      width:100%;
      max-width:1100px;
      background:white;
      border-radius:20px;
      overflow:hidden;

      display:flex;
      align-items:stretch;
    }

    .modal-left{
      flex:1;
      background:#111;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;
    }

    .modal-image{
      width:100%;
      max-height:80vh;
      object-fit:contain;
      border-radius:12px;
    }

    .modal-right{
      width:380px;
      background:white;
      padding:35px;
      overflow-y:auto;
    }

    #modalName{
      font-size:30px;
      color:#111;
      margin-bottom:30px;
      line-height:1.4;
      word-break:keep-all;
    }

    .modal-detail-box{
      border-top:1px solid #eee;
      padding-top:20px;
    }

    .modal-detail-title{
      font-size:14px;
      color:#888;
      margin-bottom:10px;
    }

    #modalDetail{
      font-size:16px;
      line-height:1.8;
      color:#333;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .modal-close{
      position:absolute;
      top:20px;
      right:25px;
      font-size:42px;
      color:white;
      cursor:pointer;
      z-index:100000;
    }

    .modal-close:hover{
      opacity:0.7;
    }

    @media (max-width:768px){

      .modal-content-wrap{
        flex-direction:column;
        max-height:92vh;
      }

      .modal-left{
        padding:15px;
      }

      .modal-image{
        max-height:45vh;
      }

      .modal-right{
        width:100%;
        padding:24px;
      }

      #modalName{
        font-size:24px;
        margin-bottom:20px;
      }

      #modalDetail{
        font-size:14px;
      }

      .modal-close{
        top:15px;
        right:18px;
        font-size:36px;
      }

    }

  </style>

</head>

<body>

  <!-- 헤더 -->
  <header>

    <h2>Y&J Fabric</h2>

    <nav class="icon-nav">

      <a href="index.html"
         class="icon-btn">
        🏠
      </a>

      <a href="order.html"
         class="icon-btn">
        💬
      </a>

    </nav>

  </header>

  <!-- 메인 -->
  <section class="hero">

    <div class="hero-overlay">

      <h1>좋은 품질 착한 가격</h1>

    </div>

  </section>

  <!-- 카테고리 -->
  <section class="categories">

    <div class="dropdown-category">

      <button
        class="category dropdown-btn"
        type="button"
      >
        원단 ▾
      </button>

      <div class="dropdown-menu">

        <a href="co.html">면</a>
        <a href="li.html">린넨</a>
        <a href="de.html">데님</a>
        <a href="ra.html">레이온</a>
        <a href="da.html">다이마루</a>

      </div>

    </div>

    <a href="order.html"
       class="category">
      상품 문의
    </a>

  </section>

  <!-- 상품 -->
  <section class="products">

    <h2>메인 상품</h2>

    <div
      class="product-grid"
      id="productGrid"
    ></div>

  </section>

  <!-- 모달 -->
  <div
    class="modal"
    id="imageModal"
  >

    <span
      class="modal-close"
      id="modalClose"
    >
      &times;
    </span>

    <div class="modal-content-wrap">

      <!-- 왼쪽 이미지 -->
      <div class="modal-left">

        <img
          id="modalImg"
          src=""
          alt=""
          class="modal-image"
        >

      </div>

      <!-- 오른쪽 정보 -->
      <div class="modal-right">

        <h2 id="modalName"></h2>

        <div class="modal-detail-box">

          <div class="modal-detail-title">
            상세 정보
          </div>

          <div id="modalDetail"></div>

        </div>

      </div>

    </div>

  </div>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      limit
    }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    const firebaseConfig = {

      apiKey: "AIzaSyAGNPNq_hkyUL4CRrUCNpMMQA9CmLGZy5o",

      authDomain: "ynjfabrickor.firebaseapp.com",

      projectId: "ynjfabrickor",

      storageBucket: "ynjfabrickor.firebasestorage.app",

      messagingSenderId: "807605740695",

      appId: "1:807605740695:web:4aaa88cf3387266bb635d2"

    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getFirestore(app);

    const productGrid =
      document.getElementById("productGrid");

    const modal =
      document.getElementById("imageModal");

    const modalImg =
      document.getElementById("modalImg");

    const modalName =
      document.getElementById("modalName");

    const modalDetail =
      document.getElementById("modalDetail");

    const modalClose =
      document.getElementById("modalClose");

    async function loadMainProducts(){

      const q = query(

        collection(db, "products"),

        where("category", "==", "ma"),

        limit(5)

      );

      const snapshot =
        await getDocs(q);

      productGrid.innerHTML = "";

      snapshot.forEach((doc) => {

        const product =
          doc.data();

        const div =
          document.createElement("div");

        div.className =
          "fabric-sample";

        div.innerHTML = `

          <div class="main-product-image-wrap">

            ${
              product.soldOut
              ? `
                <div class="soldout-badge">
                  품절
                </div>
              `
              : ""
            }

            <img
              src="${product.image}"
              alt="${product.name}"
              class="
                main-product-image
                ${
                  product.soldOut
                  ? "soldout-image"
                  : ""
                }
              "
              loading="lazy"
            >

          </div>

          <p>${product.name}</p>

        `;

        // 데이터 저장
        div.dataset.name =
          product.name || "";

        div.dataset.image =
          product.image || "";

        div.dataset.detail =
          product.detail || "";

        productGrid.appendChild(div);

      });

      // 이미지 로딩 + 클릭 이벤트
      document
        .querySelectorAll(".fabric-sample")
        .forEach((item) => {

          const img =
            item.querySelector("img");

          if(img.complete){

            img.classList.add("loaded");

          }else{

            img.onload = () => {

              img.classList.add("loaded");

            };

          }

          img.addEventListener("click", () => {

            modalImg.src =
              item.dataset.image;

            modalName.textContent =
              item.dataset.name;

            modalDetail.textContent =
              item.dataset.detail ||
              "상세 정보가 없습니다.";

            modal.classList.add("show");

          });

        });

    }

    loadMainProducts();

    // 닫기 버튼
    modalClose.addEventListener("click", () => {

      modal.classList.remove("show");

    });

    // 바깥 클릭 닫기
    modal.addEventListener("click", (e) => {

      if(e.target === modal){

        modal.classList.remove("show");

      }

    });

  </script>

</body>
</html>
