<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Y&J Fabric</title>

  <link rel="stylesheet" href="main.css?v=1">

  <style>

    .main-product-image{
      width:100%;
      border-radius:12px;
      aspect-ratio:1/1;
      object-fit:cover;
      background:#f3f3f3;
      opacity:0;
      transition:opacity .3s ease;
      display:block;
    }

    .main-product-image.loaded{
      opacity:1;
    }

  </style>

</head>

<body>

  <!-- 헤더 -->
  <header>

    <h2>Y&J Fabric</h2>

    <nav>
      <a href="index.html">홈</a>
      <a href="order.html">문의</a>
    </nav>

  </header>

  <!-- 메인 -->
  <section class="hero">

    <div class="hero-overlay">
      <h1>좋은 품질 착한 가격</h1>
      <p>Y&J Fabric</p>
    </div>

  </section>

  <!-- 카테고리 -->
  <section class="categories">

    <!-- 원단 -->
    <div class="dropdown-category">

      <button
        class="category dropdown-btn"
        type="button"
      >
        원단 ▾
      </button>

      <div class="dropdown-menu">

        <a href="co.html">면</a>
        <a href="li.html">린넨</a>
        <a href="de.html">데님</a>
        <a href="ra.html">레이온</a>
        <a href="da.html">다이마루</a>

      </div>

    </div>

    <!-- 주문 제작 -->
    <a href="order.html" class="category">
      상품 문의
    </a>

  </section>

  <!-- 상품 -->
  <section class="products">

    <h2>메인 상품</h2>

    <!-- 🔥 Firebase 상품 자동 출력 -->
    <div
      class="product-grid"
      id="productGrid"
    ></div>

  </section>

  <!-- 푸터 -->
  <footer class="footer">

    <div class="footer-container">

      <div class="footer-bottom">

        <!-- 쇼핑몰 정보 -->
        <div class="footer-col">

          <h3>쇼핑몰 기본정보</h3>

          <p>상호명 : Y&J Fabric</p>
          <p>대표자명 : 박찬화</p>
          <p>사업자 등록번호 : 603-16-14153</p>
          <p>통신판매업 신고 완료</p>

        </div>

        <!-- 고객센터 + 결제 -->
        <div class="footer-bottom-inner">

          <div class="footer-col">

            <h3>고객센터</h3>

            <p>chan104201@naver.com</p>
            <p>ynjfabric@gmail.com</p>

          </div>

          <div class="footer-col">

            <h3>결제 정보</h3>

            <p>은행 0000-000-000000</p>
            <p>예금주 : 박찬화</p>

          </div>

        </div>

      </div>

    </div>

  </footer>

  <!-- 드롭다운 -->
  <script>

    const dropdownBtn =
      document.querySelector(".dropdown-btn");

    const dropdownMenu =
      document.querySelector(".dropdown-menu");

    // 버튼 클릭
    dropdownBtn.addEventListener("click", (e) => {

      e.stopPropagation();

      dropdownMenu.classList.toggle("show");

    });

    // 메뉴 클릭 시 유지
    dropdownMenu.addEventListener("click", (e) => {

      e.stopPropagation();

    });

    // 바깥 클릭 시 닫힘
    document.addEventListener("click", () => {

      dropdownMenu.classList.remove("show");

    });

    // 모바일 터치 대응
    document.addEventListener("touchstart", () => {

      dropdownMenu.classList.remove("show");

    });

  </script>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      limit,
      orderBy
    }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    // Firebase 설정
    const firebaseConfig = {

      apiKey: "AIzaSyAGNPNq_hkyUL4CRrUCNpMMQA9CmLGZy5o",

      authDomain: "ynjfabrickor.firebaseapp.com",

      projectId: "ynjfabrickor",

      storageBucket: "ynjfabrickor.firebasestorage.app",

      messagingSenderId: "807605740695",

      appId: "1:807605740695:web:4aaa88cf3387266bb635d2"

    };

    // Firebase 시작
    const app =
      initializeApp(firebaseConfig);

    const db =
      getFirestore(app);

    const productGrid =
      document.getElementById("productGrid");

    // 메인 상품 불러오기
    async function loadMainProducts(){

      try{

        const q = query(
          collection(db, "products"),
          where("category", "==", "ma"),
          orderBy("createdAt", "desc"),
          limit(5)
        );

        const snapshot =
          await getDocs(q);

        productGrid.innerHTML = "";

        // 상품 없을 때
        if(snapshot.empty){

          productGrid.innerHTML = `
            <p style="
              width:100%;
              text-align:center;
              padding:40px 0;
              color:#777;
            ">
              메인 상품이 없습니다.
            </p>
          `;

          return;

        }

        snapshot.forEach((doc) => {

          const product =
            doc.data();

          const div =
            document.createElement("div");

          div.className =
            "fabric-sample";

          div.innerHTML = `

            <img
              src="${product.image}"
              alt="${product.name}"
              class="main-product-image"
              loading="lazy"
            >

            <p>${product.name}</p>

          `;

          productGrid.appendChild(div);

        });

        // 이미지 로딩 효과
        const images =
          document.querySelectorAll(".main-product-image");

        images.forEach((img) => {

          if(img.complete){

            img.classList.add("loaded");

          } else {

            img.onload = () => {

              img.classList.add("loaded");

            };

          }

        });

      }catch(error){

        console.log(error);

        productGrid.innerHTML = `
          <p style="
            width:100%;
            text-align:center;
            padding:40px 0;
            color:red;
          ">
            상품을 불러오지 못했습니다.
          </p>
        `;

      }

    }

    // 실행
    loadMainProducts();

  </script>

</body>

</html>
