<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Y&J Fabric</title>

  <link rel="stylesheet" href="main.css?v=2">

  <style>

    .main-product-image-wrap{
      position:relative;
      overflow:hidden;
      border-radius:12px;
    }

    .main-product-image{
      width:100%;
      border-radius:12px;
      aspect-ratio:1/1;
      object-fit:cover;
      background:#f3f3f3;
      opacity:0;
      transition:opacity .3s ease;
      display:block;
      cursor:pointer;
    }

    .main-product-image.loaded{
      opacity:1;
    }

    .soldout-image{
      filter:grayscale(100%) brightness(0.7);
    }

    .soldout-badge{
      position:absolute;
      top:12px;
      left:12px;
      background:#d11a2a;
      color:white;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:bold;
      z-index:10;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    @media (max-width:768px){
      .soldout-badge{
        top:8px;
        left:8px;
        padding:6px 12px;
        font-size:12px;
      }
    }

    /* =========================
       모달
    ========================= */

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      z-index:99999;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal.show{
      display:flex;
    }

    .modal-content{
      text-align:center;
    }

    .modal img{
      max-width:90%;
      max-height:80vh;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    #modalName{
      margin-top:15px;
      color:white;
      font-size:20px;
      font-weight:600;
    }

    .modal-close{
      position:absolute;
      top:20px;
      right:25px;
      font-size:40px;
      color:white;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <!-- 헤더 -->
  <header>
    <h2>Y&J Fabric</h2>

    <nav class="icon-nav">
      <a href="index.html" class="icon-btn">🏠</a>
      <a href="order.html" class="icon-btn">💬</a>
    </nav>
  </header>

  <!-- 메인 -->
  <section class="hero">
    <div class="hero-overlay">
      <h1>좋은 품질 착한 가격</h1>
    </div>
  </section>

  <!-- 카테고리 -->
  <section class="categories">

    <div class="dropdown-category">
      <button class="category dropdown-btn" type="button">
        원단 ▾
      </button>

      <div class="dropdown-menu">
        <a href="co.html">면</a>
        <a href="li.html">린넨</a>
        <a href="de.html">데님</a>
        <a href="ra.html">레이온</a>
        <a href="da.html">다이마루</a>
      </div>
    </div>

    <a href="order.html" class="category">
      상품 문의
    </a>

  </section>

  <!-- 상품 -->
  <section class="products">

    <h2>메인 상품</h2>

    <div class="product-grid" id="productGrid"></div>

  </section>

  <!-- 모달 -->
  <div class="modal" id="imageModal">

    <span class="modal-close" id="modalClose">&times;</span>

    <div class="modal-content">
      <img id="modalImg" src="" alt="">
      <p id="modalName"></p>
    </div>

  </div>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAGNPNq_hkyUL4CRrUCNpMMQA9CmLGZy5o",
      authDomain: "ynjfabrickor.firebaseapp.com",
      projectId: "ynjfabrickor",
      storageBucket: "ynjfabrickor.firebasestorage.app",
      messagingSenderId: "807605740695",
      appId: "1:807605740695:web:4aaa88cf3387266bb635d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const productGrid = document.getElementById("productGrid");

    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const modalName = document.getElementById("modalName");
    const modalClose = document.getElementById("modalClose");

    async function loadMainProducts(){

      const q = query(
        collection(db, "products"),
        where("category", "==", "ma"),
        limit(5)
      );

      const snapshot = await getDocs(q);

      productGrid.innerHTML = "";

      snapshot.forEach((doc) => {

        const product = doc.data();

        const div = document.createElement("div");
        div.className = "fabric-sample";

        div.innerHTML = `
          <div class="main-product-image-wrap">

            ${product.soldOut ? `<div class="soldout-badge">품절</div>` : ""}

            <img
              src="${product.image}"
              alt="${product.name}"
              class="main-product-image ${product.soldOut ? "soldout-image" : ""}"
              loading="lazy"
            >

          </div>

          <p>${product.name}</p>
        `;

        // ⭐ co.html 방식: 데이터 직접 묶기
        div.dataset.name = product.name;
        div.dataset.image = product.image;

        productGrid.appendChild(div);

      });

      // 이미지 로딩 + 클릭 이벤트 (co 방식)
      document.querySelectorAll(".fabric-sample").forEach((item) => {

        const img = item.querySelector("img");

        if(img.complete){
          img.classList.add("loaded");
        } else {
          img.onload = () => img.classList.add("loaded");
        }

        img.addEventListener("click", () => {

          modalImg.src = img.src;
          modalName.textContent = item.dataset.name;

          modal.classList.add("show");

        });

      });

    }

    loadMainProducts();

    // 닫기
    modalClose.addEventListener("click", () => {
      modal.classList.remove("show");
    });

    modal.addEventListener("click", (e) => {
      if(e.target === modal){
        modal.classList.remove("show");
      }
    });

  </script>

</body>
</html>
