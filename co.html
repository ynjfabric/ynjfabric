<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>면 | Y&J Fabric</title>

  <link rel="stylesheet" href="co.css?v=5">

  <style>

    /* 검색 + 정렬 */
    .search-wrap{
      width:100%;
      max-width:900px;

      margin:20px auto 10px;

      padding:0 20px;

      display:flex;
      align-items:center;

      gap:10px;
    }

    /* 검색 */
    .search-box{
      flex:1;
    }

    .search-box input{
      width:100%;
      height:50px;

      border:1px solid #ddd;
      border-radius:12px;

      padding:0 15px;

      font-size:16px;

      outline:none;
    }

    .search-box input:focus{
      border-color:#222;
    }

    /* 정렬 */
    .sort-box{
      width:130px;
      flex-shrink:0;
    }

    .sort-box select{
      width:100%;
      height:50px;

      border:1px solid #ddd;
      border-radius:12px;

      padding:0 12px;

      font-size:15px;

      background:#fff;

      outline:none;

      cursor:pointer;
    }

    .sort-box select:focus{
      border-color:#222;
    }

    /* 이미지 로딩 효과 */
    .item img{
      width:100%;
      display:block;
      border-radius:10px;
      background:#f1f1f1;
      opacity:0;
      transition:opacity .3s ease;
      aspect-ratio:1/1;
      object-fit:cover;
    }

    .item img.loaded{
      opacity:1;
    }

    /* 모바일 */
    @media (max-width:768px){

      .search-wrap{
        gap:8px;
      }

      .sort-box{
        width:120px;
      }

      .search-box input,
      .sort-box select{
        height:46px;
        font-size:14px;
      }

    }

  </style>

</head>

<body>

  <!-- 헤더 -->
  <header>

    <h2>Y&J Fabric</h2>

    <nav>
      <a href="index.html">홈</a>
      <a href="order.html">문의</a>
    </nav>

  </header>

  <!-- 메인 배너 -->
  <section class="hero">

    <div class="hero-overlay">
      <h1>면</h1>
      <p>Premium Cotton Fabric</p>
    </div>

  </section>

  <!-- 카테고리 -->
  <section class="categories">

    <div class="dropdown-category">

      <div class="category">
        원단 ▾
      </div>

      <div class="dropdown-menu">
        <a href="co.html">면</a>
        <a href="li.html">린넨</a>
        <a href="de.html">데님</a>
        <a href="ra.html">레이온</a>
        <a href="da.html">다이마루</a>
      </div>

    </div>

    <a href="order.html" class="category">
      상품 문의
    </a>

  </section>

  <!-- 제목 -->
  <section class="page-title">
    <h2>면 상품</h2>
  </section>

  <!-- 검색 + 정렬 -->
  <div class="search-wrap">

    <!-- 검색 -->
    <div class="search-box">

      <input
        type="text"
        id="searchInput"
        placeholder="상품 검색"
      >

    </div>

    <!-- 정렬 -->
    <div class="sort-box">

      <select id="sortSelect">

        <option value="latest">
          최신순
        </option>

        <option value="name">
          이름순
        </option>

      </select>

    </div>

  </div>

  <!-- 상품 -->
  <section class="products">

    <div class="grid" id="grid"></div>

    <div id="loading">
      로딩중...
    </div>

  </section>

  <!-- 맨 위 버튼 -->
  <button id="topBtn">↑</button>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where
    }
    from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    // Firebase 설정
    const firebaseConfig = {

      apiKey: "AIzaSyAGNPNq_hkyUL4CRrUCNpMMQA9CmLGZy5o",

      authDomain: "ynjfabrickor.firebaseapp.com",

      projectId: "ynjfabrickor",

      storageBucket: "ynjfabrickor.firebasestorage.app",

      messagingSenderId: "807605740695",

      appId: "1:807605740695:web:4aaa88cf3387266bb635d2"

    };

    // Firebase 시작
    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    // 요소
    const grid =
      document.getElementById("grid");

    const loading =
      document.getElementById("loading");

    const topBtn =
      document.getElementById("topBtn");

    const searchInput =
      document.getElementById("searchInput");

    const sortSelect =
      document.getElementById("sortSelect");

    // 페이지
    let page = 0;

    const pageSize = 12;

    let products = [];

    let filteredProducts = [];

    // Firestore 상품 불러오기
    async function loadProducts() {

      try {

        loading.style.display = "block";

        const q = query(
          collection(db, "products"),
          where("category", "==", "co")
        );

        const querySnapshot =
          await getDocs(q);

        products = [];

        querySnapshot.forEach((doc) => {

          products.push(doc.data());

        });

        filteredProducts = [...products];

        sortProducts("latest");

        // 상품 없을 때
        if (products.length === 0) {

          loading.innerHTML =
            "등록된 상품이 없습니다.";

          return;

        }

        renderProducts();

      } catch (error) {

        console.error(error);

        loading.innerHTML =
          "상품을 불러오지 못했습니다.";

      }

    }

    // 정렬 함수
    function sortProducts(type){

      // 최신순
      if(type === "latest"){

        filteredProducts.sort((a, b) => {

          return b.createdAt - a.createdAt;

        });

      }

      // 이름순
      if(type === "name"){

        filteredProducts.sort((a, b) => {

          return a.name.localeCompare(
            b.name,
            "ko"
          );

        });

      }

    }

    // 상품 출력
    function renderProducts(reset = true) {

      if(reset){

        page = 0;

        grid.innerHTML = "";

      }

      const start =
        page * pageSize;

      const end =
        start + pageSize;

      const items =
        filteredProducts.slice(start, end);

      items.forEach(product => {

        const div =
          document.createElement("div");

        div.className = "item";

        div.innerHTML = `
          <img
            src="${product.image}"
            alt="${product.name}"
            loading="lazy"
          >

          <p>${product.name}</p>
        `;

        grid.appendChild(div);

      });

      // 이미지 로딩 완료 효과
      const images =
        grid.querySelectorAll("img");

      images.forEach((img) => {

        if(img.complete){

          img.classList.add("loaded");

        } else {

          img.onload = () => {

            img.classList.add("loaded");

          };

        }

      });

      page++;

      // 검색 결과 없을 때
      if(filteredProducts.length === 0){

        grid.innerHTML = `
          <p style="
            width:100%;
            text-align:center;
            padding:40px 0;
            color:#777;
          ">
            검색 결과가 없습니다.
          </p>
        `;

      }

      loading.style.display = "none";

    }

    // 검색
    searchInput.addEventListener("input", () => {

      const keyword =
        searchInput.value
        .toLowerCase()
        .trim();

      filteredProducts = [...products].filter(product => {

        return product.name
          .toLowerCase()
          .includes(keyword);

      });

      sortProducts(sortSelect.value);

      renderProducts(true);

    });

    // 정렬 변경
    sortSelect.addEventListener("change", () => {

      sortProducts(sortSelect.value);

      renderProducts(true);

    });

    // 스크롤
    window.addEventListener("scroll", () => {

      // 무한 스크롤
      if (
        window.innerHeight + window.scrollY >=
        document.body.offsetHeight - 150
      ) {

        if (
          page * pageSize <
          filteredProducts.length
        ) {

          renderProducts(false);

        }

      }

      // 맨 위 버튼
      if (window.scrollY > 300) {

        topBtn.classList.add("show");

      } else {

        topBtn.classList.remove("show");

      }

    });

    // 맨 위 이동
    topBtn.addEventListener("click", () => {

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });

    });

    // 실행
    loadProducts();

  </script>

</body>

</html>
